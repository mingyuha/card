<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>카드 실적 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0C0E14;
  --surface: #161820;
  --surface2: #1E2030;
  --border: #252840;
  --text: #E8E8F0;
  --muted: #6B6D80;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 16px 80px;
  -webkit-font-smoothing: antialiased;
}
.header { text-align: center; margin-bottom: 28px; }
.header-label { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 900; color: #fff; }
.header-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
.header-reset {
  margin-top: 12px; display: inline-block; font-size: 11px;
  color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; cursor: pointer;
}
.card {
  background: var(--surface); border-radius: 18px; padding: 20px;
  border: 1px solid var(--border); margin-bottom: 16px; transition: border-color 0.3s, box-shadow 0.3s;
}
.card.done { box-shadow: 0 0 28px var(--glow); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-name { font-size: 14px; font-weight: 700; }
.card-target { font-size: 11px; color: var(--muted); margin-top: 2px; }
.badge-done { font-size: 10px; font-weight: 700; border-radius: 20px; padding: 3px 10px; color: #fff; display: none; }
.done .badge-done { display: block; }
.progress-track { background: var(--surface2); border-radius: 99px; height: 5px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.sec-label { font-size: 10px; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.3px; }

/* 사용내역 */
.tx-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.tx-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px;
}
.tx-desc {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: inherit; min-width: 0;
}
.tx-desc::placeholder { color: var(--muted); }
.tx-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.tx-amount {
  width: 100px; background: transparent; border: none;
  outline: none; font-size: 14px; font-weight: 700;
  font-family: inherit; text-align: right; padding-left: 8px;
}
.tx-amount::placeholder { color: var(--muted); font-weight: 400; font-size: 12px; }
.tx-won { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.tx-del {
  width: 22px; height: 22px; border-radius: 50%; background: #ff4d4d22;
  border: none; color: #ff6b6b; font-size: 16px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.add-btn {
  width: 100%; padding: 9px; border-radius: 10px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--muted); font-size: 13px; font-family: inherit;
  cursor: pointer; margin-bottom: 14px;
}
.add-btn:active { background: var(--surface2); }

/* 예약결제 — 수정 가능 */
.scheduled-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.sched-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px;
}
.sched-item.off { opacity: 0.4; }
/* 토글 버튼 */
.sched-toggle {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.sched-item:not(.off) .sched-toggle { border-color: var(--accent-color); background: var(--accent-color); }
.sched-toggle::after { content: "✓"; font-size: 11px; color: #fff; display: none; }
.sched-item:not(.off) .sched-toggle::after { display: block; }
/* 라벨/금액 인풋 */
.sched-desc {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: inherit; min-width: 0;
}
.sched-desc::placeholder { color: var(--muted); }
.sched-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.sched-amount {
  width: 95px; background: transparent; border: none;
  outline: none; font-size: 13px; font-weight: 700;
  font-family: inherit; text-align: right; padding-left: 6px;
}
.sched-won { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.sched-del {
  width: 22px; height: 22px; border-radius: 50%; background: #ff4d4d22;
  border: none; color: #ff6b6b; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.add-sched-btn {
  width: 100%; padding: 9px; border-radius: 10px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--muted); font-size: 13px; font-family: inherit;
  cursor: pointer; margin-bottom: 14px;
}
.add-sched-btn:active { background: var(--surface2); }

/* 요약 */
.summary { background: var(--bg); border-radius: 12px; padding: 13px 14px; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.sk { font-size: 11px; color: var(--muted); }
.sv { font-size: 12px; color: #aaa; }
.summary-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.summary-main { display: flex; justify-content: space-between; align-items: center; }
.mk { font-size: 13px; font-weight: 700; }
.mv { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.card-note { font-size: 11px; color: var(--muted); margin-top: 11px; }

/* 상단 요약 */
.top-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 16px 18px; margin-bottom: 20px;
}
.top-summary-title {
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 12px;
}
.top-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ts-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 13px; transition: border-color 0.3s;
}
.ts-item.done { border-color: var(--ts-accent); }
.ts-item .ts-name { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
.ts-item .ts-target { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.ts-item .ts-remaining { font-size: 15px; font-weight: 900; letter-spacing: -0.3px; }
.ts-item.done .ts-remaining { font-size: 13px; }
.ts-item .ts-bar { background: var(--bg); border-radius: 99px; height: 3px; margin-top: 8px; overflow: hidden; }
.ts-item .ts-bar-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Card Performance</div>
  <h1>카드 실적 관리</h1>
  <div class="header-date" id="headerDate"></div>
  <div class="header-reset" onclick="resetAll()">🔄 이번 달 초기화</div>
</div>

<div class="top-summary">
  <div class="top-summary-title">이번 달 실적 현황</div>
  <div class="top-summary-grid" id="topSummaryGrid"></div>
</div>

<div id="cardList"></div>

<script>
const DEFAULT_CARDS = [
  {
    id:"kb_shopping", name:"국민 쇼핑카드", target:400000,
    color:"#FFBF5E", accent:"#E07800",
    scheduled:[
      {id:"s1",label:"KB 손보",amount:13967},
      {id:"s2",label:"KB 손보",amount:14146},
      {id:"s3",label:"신한생명",amount:40400},
      {id:"s4",label:"신한생명",amount:32520},
      {id:"s5",label:"코웨이",amount:15900},
      {id:"s6",label:"DB",amount:20510},
    ],
    note:"⛽ 주유 최소 5만원 별도 조건"
  },
  {
    id:"kb_nexen", name:"국민 넥센타이어", target:300000,
    color:"#7DD8F8", accent:"#0099CC",
    scheduled:[], note:""
  },
  {
    id:"bc_kt", name:"BC KT", target:400000,
    color:"#82E0C4", accent:"#1FAF84",
    scheduled:[
      {id:"s1",label:"KT 인터넷",amount:13030},
      {id:"s2",label:"KT 요금 ME",amount:106580},
      {id:"s3",label:"KT 요금 향수",amount:51750},
      {id:"s4",label:"숨 유플러스",amount:66000},
    ],
    note:""
  },
  {
    id:"hyundai_naver", name:"현대 네이버", target:300000,
    color:"#B8A8F0", accent:"#7C5FD4",
    scheduled:[
      {id:"s1",label:"네이버플러스 멤버십",amount:11500},
    ],
    note:""
  },
];

// state: { [cardId]: { transactions:[{id,desc,amount}], scheduled:[{id,label,amount,active}] } }
function loadState() {
  try { return JSON.parse(localStorage.getItem("cardTracker_v4")) || {}; } catch { return {}; }
}
function saveState() { localStorage.setItem("cardTracker_v4", JSON.stringify(state)); }
let state = loadState();

function getCS(cardId) {
  const card = DEFAULT_CARDS.find(c => c.id === cardId);
  if (!state[cardId]) {
    // 초기 상태: 기본 예약결제를 state에 복사
    state[cardId] = {
      transactions: [],
      scheduled: card.scheduled.map(s => ({ ...s, active: true }))
    };
  }
  if (!state[cardId].transactions) state[cardId].transactions = [];
  if (!state[cardId].scheduled) {
    state[cardId].scheduled = card.scheduled.map(s => ({ ...s, active: true }));
  }
  return state[cardId];
}

function fmt(n) { return n.toLocaleString("ko-KR") + "원"; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function uid() { return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }

/* ── 사용내역 ── */
function addTx(cardId) {
  const cs = getCS(cardId);
  const txId = uid();
  cs.transactions.push({ id:txId, desc:"", amount:0 });
  saveState(); renderCard(cardId);
  setTimeout(() => { const el = document.getElementById("d_"+txId); if(el) el.focus(); }, 30);
}
function updateTx(cardId, txId, field, val) {
  const tx = getCS(cardId).transactions.find(t => t.id === txId);
  if (!tx) return;
  if (field === "amount") tx.amount = parseInt(val.replace(/[^0-9]/g,""))||0;
  else tx.desc = val;
  saveState(); updateSummary(cardId);
}
function deleteTx(cardId, txId) {
  const cs = getCS(cardId);
  cs.transactions = cs.transactions.filter(t => t.id !== txId);
  saveState(); renderCard(cardId);
}

/* ── 예약결제 ── */
function addSched(cardId) {
  const cs = getCS(cardId);
  cs.scheduled.push({ id: uid(), label:"", amount:0, active:true });
  saveState(); renderCard(cardId);
}
function updateSched(cardId, sId, field, val) {
  const s = getCS(cardId).scheduled.find(s => s.id === sId);
  if (!s) return;
  if (field === "amount") s.amount = parseInt(val.replace(/[^0-9]/g,""))||0;
  else s.label = val;
  saveState(); updateSummary(cardId);
}
function toggleSched(cardId, sId) {
  const s = getCS(cardId).scheduled.find(s => s.id === sId);
  if (!s) return;
  s.active = !s.active;
  saveState(); renderCard(cardId);
}
function deleteSched(cardId, sId) {
  const cs = getCS(cardId);
  cs.scheduled = cs.scheduled.filter(s => s.id !== sId);
  saveState(); renderCard(cardId);
}

/* ── 계산 ── */
function calcTotals(cardId) {
  const cs = getCS(cardId);
  const card = DEFAULT_CARDS.find(c => c.id === cardId);
  const usedTotal = cs.transactions.reduce((s,t) => s+(t.amount||0), 0);
  const scheduledTotal = cs.scheduled.filter(s => s.active).reduce((s,p) => s+p.amount, 0);
  const total = usedTotal + scheduledTotal;
  const remaining = Math.max(0, card.target - total);
  const progress = Math.min(100, (total/card.target)*100);
  return { usedTotal, scheduledTotal, remaining, progress, isDone: total >= card.target };
}

function updateSummary(cardId) {
  const card = DEFAULT_CARDS.find(c => c.id === cardId);
  const { usedTotal, scheduledTotal, remaining, progress, isDone } = calcTotals(cardId);
  const el = document.getElementById("card_"+cardId);
  if (!el) return;
  el.classList.toggle("done", isDone);
  el.style.setProperty("--glow", card.accent+"44");
  el.style.borderColor = isDone ? card.accent : "";
  el.querySelector(".progress-fill").style.width = progress+"%";
  el.querySelector(".sv-used").textContent = fmt(usedTotal);
  el.querySelector(".sv-sched").textContent = "+ "+fmt(scheduledTotal);
  const mk = el.querySelector(".mk"), mv = el.querySelector(".mv");
  const over = (usedTotal + scheduledTotal) - card.target;
  if (isDone) {
    mk.textContent="🎉 실적 달성!"; mk.style.color=card.color;
    mv.textContent = over > 0 ? fmt(over) + " 초과" : "딱 맞음";
    mv.style.color=card.color;
  } else {
    mk.textContent="추가 필요 금액"; mk.style.color="#fff";
    mv.textContent=fmt(remaining); mv.style.color="#fff";
  }

  // 상단 요약 갱신
  const ts = document.getElementById("ts_"+cardId);
  if (ts) {
    ts.classList.toggle("done", isDone);
    ts.style.setProperty("--ts-accent", card.accent);
    ts.querySelector(".ts-name").style.color = card.color;
    ts.querySelector(".ts-target").textContent = "목표 " + fmt(card.target);
    const rem = ts.querySelector(".ts-remaining");
    if (isDone) {
      rem.textContent = "✓ 달성";
      rem.style.color = card.color;
    } else {
      rem.textContent = fmt(remaining) + " 남음";
      rem.style.color = "#fff";
    }
    ts.querySelector(".ts-bar-fill").style.width = progress + "%";
  }
}

function renderCard(cardId) {
  const card = DEFAULT_CARDS.find(c => c.id === cardId);
  const cs = getCS(cardId);
  const el = document.getElementById("card_"+cardId);

  // 사용내역
  el.querySelector(".tx-list").innerHTML = cs.transactions.map(tx => `
    <div class="tx-item">
      <input class="tx-desc" id="d_${tx.id}" type="text" placeholder="사용내역"
        value="${esc(tx.desc)}"
        oninput="updateTx('${cardId}','${tx.id}','desc',this.value)">
      <div class="tx-sep"></div>
      <input class="tx-amount" type="tel" placeholder="금액"
        value="${tx.amount ? tx.amount.toLocaleString('ko-KR') : ''}"
        style="color:${card.color}"
        oninput="updateTx('${cardId}','${tx.id}','amount',this.value)"
        onfocus="this.select()">
      <span class="tx-won">원</span>
      <button class="tx-del" onclick="deleteTx('${cardId}','${tx.id}')">×</button>
    </div>
  `).join("");

  // 예약결제
  el.querySelector(".scheduled-list").innerHTML = cs.scheduled.map(s => `
    <div class="sched-item ${s.active?'':'off'}" style="--accent-color:${card.accent}">
      <button class="sched-toggle" onclick="toggleSched('${cardId}','${s.id}')"></button>
      <input class="sched-desc" type="text" placeholder="항목명"
        value="${esc(s.label)}"
        oninput="updateSched('${cardId}','${s.id}','label',this.value)">
      <div class="sched-sep"></div>
      <input class="sched-amount" type="tel" placeholder="금액"
        value="${s.amount ? s.amount.toLocaleString('ko-KR') : ''}"
        style="color:${s.active ? card.color : 'var(--muted)'}"
        oninput="updateSched('${cardId}','${s.id}','amount',this.value)"
        onfocus="this.select()">
      <span class="sched-won">원</span>
      <button class="sched-del" onclick="deleteSched('${cardId}','${s.id}')">×</button>
    </div>
  `).join("");

  updateSummary(cardId);
}

function resetAll() {
  if (!confirm("이번 달 사용내역을 초기화할까요?\n(예약결제 항목은 유지됩니다)")) return;
  Object.keys(state).forEach(id => { if (state[id]) state[id].transactions = []; });
  saveState();
  DEFAULT_CARDS.forEach(c => renderCard(c.id));
}

function buildCards() {
  const list = document.getElementById("cardList");
  DEFAULT_CARDS.forEach(card => {
    const noteHTML = card.note ? `<div class="card-note">${card.note}</div>` : "";
    const div = document.createElement("div");
    div.className = "card";
    div.id = "card_"+card.id;
    div.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name" style="color:${card.color}">${card.name}</div>
          <div class="card-target">목표 ${fmt(card.target)}</div>
        </div>
        <div class="badge-done" style="background:${card.accent}">✓ 달성</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="background:linear-gradient(90deg,${card.accent},${card.color})"></div>
      </div>

      <div class="sec-label">사용내역</div>
      <div class="tx-list"></div>
      <button class="add-btn" onclick="addTx('${card.id}')">＋ 사용내역 추가</button>

      <div class="sec-label">예약결제 (수정·추가·제외 가능)</div>
      <div class="scheduled-list"></div>
      <button class="add-sched-btn" onclick="addSched('${card.id}')">＋ 예약결제 추가</button>

      <div class="summary">
        <div class="summary-row"><span class="sk">직접 사용 합계</span><span class="sv sv-used">0원</span></div>
        <div class="summary-row"><span class="sk">예약결제 합산</span><span class="sv sv-sched">+ 0원</span></div>
        <hr class="summary-divider">
        <div class="summary-main">
          <span class="mk">추가 필요 금액</span>
          <span class="mv">-</span>
        </div>
      </div>
      ${noteHTML}
    `;
    list.appendChild(div);
    renderCard(card.id);
  });
}

document.getElementById("headerDate").textContent =
  new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long"}) + " 기준";

// 상단 요약 그리드 생성
(function() {
  const grid = document.getElementById("topSummaryGrid");
  DEFAULT_CARDS.forEach(card => {
    const div = document.createElement("div");
    div.className = "ts-item";
    div.id = "ts_" + card.id;
    div.innerHTML = `
      <div class="ts-name" style="color:${card.color}">${card.name}</div>
      <div class="ts-target">-</div>
      <div class="ts-remaining">-</div>
      <div class="ts-bar">
        <div class="ts-bar-fill" style="background:linear-gradient(90deg,${card.accent},${card.color})"></div>
      </div>
    `;
    grid.appendChild(div);
  });
})();

buildCards();
</script>
</body>
</html>
