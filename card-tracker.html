<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>카드 실적 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0C0E14;
  --surface: #161820;
  --surface2: #1E2030;
  --border: #252840;
  --text: #E8E8F0;
  --muted: #6B6D80;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 16px 80px;
  -webkit-font-smoothing: antialiased;
}

/* header */
.header { text-align: center; margin-bottom: 28px; }
.header-label { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 900; color: #fff; }
.header-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
.header-reset {
  margin-top: 12px; display: inline-block; font-size: 11px;
  color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; cursor: pointer;
}

/* card */
.card {
  background: var(--surface); border-radius: 18px; padding: 20px;
  border: 1px solid var(--border); margin-bottom: 16px; transition: border-color 0.3s, box-shadow 0.3s;
}
.card.done { box-shadow: 0 0 28px var(--glow); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-name { font-size: 14px; font-weight: 700; }
.card-target { font-size: 11px; color: var(--muted); margin-top: 2px; }
.badge-done { font-size: 10px; font-weight: 700; border-radius: 20px; padding: 3px 10px; color: #fff; display: none; }
.done .badge-done { display: block; }

/* progress */
.progress-track { background: var(--surface2); border-radius: 99px; height: 5px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* section label */
.sec-label { font-size: 10px; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.3px; }

/* transactions */
.tx-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.tx-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px;
}
.tx-item .tx-desc {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: inherit;
  min-width: 0;
}
.tx-item .tx-desc::placeholder { color: var(--muted); }
.tx-item .tx-amount {
  width: 110px; background: transparent; border: none; border-left: 1px solid var(--border);
  outline: none; font-size: 14px; font-weight: 700; color: #fff;
  font-family: inherit; text-align: right; padding-left: 8px;
}
.tx-item .tx-amount::placeholder { color: var(--muted); font-weight: 400; }
.tx-item .tx-won { font-size: 11px; color: var(--muted); margin-left: 3px; flex-shrink: 0; }
.tx-item .tx-del {
  width: 22px; height: 22px; border-radius: 50%; background: #ff4d4d22;
  border: none; color: #ff6b6b; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.2s;
}
.tx-item .tx-del:hover { background: #ff4d4d44; }

/* add button */
.add-btn {
  width: 100%; padding: 9px; border-radius: 10px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--muted); font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all 0.2s; margin-bottom: 14px;
}
.add-btn:hover { border-color: #4a4d70; color: var(--text); background: var(--surface2); }

/* scheduled */
.scheduled-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.scheduled-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; cursor: pointer; transition: all 0.2s;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.scheduled-item.off { opacity: 0.35; }
.scheduled-item .s-label { font-size: 12px; color: #bbb; }
.scheduled-item .s-amount { font-size: 12px; font-weight: 600; }

/* summary */
.summary { background: var(--bg); border-radius: 12px; padding: 13px 14px; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.summary-row .sk { font-size: 11px; color: var(--muted); }
.summary-row .sv { font-size: 12px; color: #aaa; }
.summary-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.summary-main { display: flex; justify-content: space-between; align-items: center; }
.summary-main .mk { font-size: 13px; font-weight: 700; }
.summary-main .mv { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

.card-note { font-size: 11px; color: var(--muted); margin-top: 11px; padding-left: 2px; }

/* modal overlay for amount input */
.overlay {
  display: none; position: fixed; inset: 0; background: #000a;
  z-index: 100; align-items: flex-end; justify-content: center;
}
.overlay.show { display: flex; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Card Performance</div>
  <h1>카드 실적 관리</h1>
  <div class="header-date" id="headerDate"></div>
  <div class="header-reset" onclick="resetAll()">🔄 이번 달 초기화</div>
</div>

<div id="cardList"></div>

<script>
const CARDS = [
  {
    id: "kb_shopping",
    name: "국민 쇼핑카드",
    target: 400000,
    color: "#FFBF5E",
    accent: "#E07800",
    scheduled: [
      { id:"s1", label:"KB 손보", amount:13967 },
      { id:"s2", label:"KB 손보", amount:14146 },
      { id:"s3", label:"신한생명", amount:40400 },
      { id:"s4", label:"신한생명", amount:32520 },
      { id:"s5", label:"코웨이", amount:15900 },
      { id:"s6", label:"DB", amount:20510 },
    ],
    note: "⛽ 주유 최소 5만원 별도 조건"
  },
  {
    id: "kb_nexen",
    name: "국민 넥센타이어",
    target: 300000,
    color: "#7DD8F8",
    accent: "#0099CC",
    scheduled: [],
    note: ""
  },
  {
    id: "bc_kt",
    name: "BC KT",
    target: 400000,
    color: "#82E0C4",
    accent: "#1FAF84",
    scheduled: [
      { id:"s1", label:"KT 인터넷", amount:13030 },
      { id:"s2", label:"KT 요금 ME", amount:106580 },
      { id:"s3", label:"KT 요금 향수", amount:51750 },
      { id:"s4", label:"숨 유플러스", amount:66000 },
    ],
    note: ""
  },
  {
    id: "hyundai_naver",
    name: "현대 네이버",
    target: 300000,
    color: "#B8A8F0",
    accent: "#7C5FD4",
    scheduled: [
      { id:"s1", label:"네이버플러스 멤버십", amount:11500 },
    ],
    note: ""
  },
];

function loadState() {
  try { return JSON.parse(localStorage.getItem("cardTracker_v3")) || {}; }
  catch { return {}; }
}
function saveState() { localStorage.setItem("cardTracker_v3", JSON.stringify(state)); }

let state = loadState();

function getCS(id) {
  if (!state[id]) state[id] = { transactions: [], offIds: [] };
  if (!state[id].transactions) state[id].transactions = [];
  if (!state[id].offIds) state[id].offIds = [];
  return state[id];
}

function fmt(n) { return n.toLocaleString("ko-KR") + "원"; }

function addTx(cardId) {
  const cs = getCS(cardId);
  const newId = "tx_" + Date.now();
  cs.transactions.push({ id: newId, desc: "", amount: 0 });
  saveState();
  renderCard(cardId);
  // focus new desc input
  setTimeout(() => {
    const el = document.querySelector(`#tx_${newId}_desc`);
    if (el) el.focus();
  }, 50);
}

function updateTx(cardId, txId, field, val) {
  const cs = getCS(cardId);
  const tx = cs.transactions.find(t => t.id === txId);
  if (!tx) return;
  if (field === "amount") tx.amount = parseInt(val.replace(/[^0-9]/g, "")) || 0;
  else tx.desc = val;
  saveState();
  renderSummary(cardId);
}

function deleteTx(cardId, txId) {
  const cs = getCS(cardId);
  cs.transactions = cs.transactions.filter(t => t.id !== txId);
  saveState();
  renderCard(cardId);
}

function toggleScheduled(cardId, sId) {
  const cs = getCS(cardId);
  const idx = cs.offIds.indexOf(sId);
  if (idx >= 0) cs.offIds.splice(idx, 1);
  else cs.offIds.push(sId);
  saveState();
  renderCard(cardId);
}

function resetAll() {
  if (!confirm("이번 달 입력값을 모두 초기화할까요?")) return;
  state = {};
  saveState();
  CARDS.forEach(c => renderCard(c.id));
}

function calcTotals(card) {
  const cs = getCS(card.id);
  const usedTotal = cs.transactions.reduce((s, t) => s + (t.amount || 0), 0);
  const scheduledTotal = card.scheduled
    .filter(p => !cs.offIds.includes(p.id))
    .reduce((s, p) => s + p.amount, 0);
  const total = usedTotal + scheduledTotal;
  const remaining = Math.max(0, card.target - total);
  const progress = Math.min(100, (total / card.target) * 100);
  const isDone = total >= card.target;
  return { usedTotal, scheduledTotal, total, remaining, progress, isDone };
}

function renderSummary(cardId) {
  const card = CARDS.find(c => c.id === cardId);
  const { usedTotal, scheduledTotal, remaining, progress, isDone } = calcTotals(card);
  const el = document.getElementById("card_" + cardId);
  if (!el) return;

  el.classList.toggle("done", isDone);
  el.style.setProperty("--glow", card.accent + "44");
  el.style.borderColor = isDone ? card.accent : "";

  el.querySelector(".progress-fill").style.width = progress + "%";
  el.querySelector(".sv-used").textContent = fmt(usedTotal);
  el.querySelector(".sv-scheduled").textContent = "+ " + fmt(scheduledTotal);

  const mk = el.querySelector(".mk");
  const mv = el.querySelector(".mv");
  if (isDone) {
    mk.textContent = "🎉 실적 달성!";
    mk.style.color = card.color;
    mv.textContent = "완료";
    mv.style.color = card.color;
  } else {
    mk.textContent = "추가 필요 금액";
    mk.style.color = "#fff";
    mv.textContent = fmt(remaining);
    mv.style.color = "#fff";
  }
}

function renderCard(cardId) {
  const card = CARDS.find(c => c.id === cardId);
  const cs = getCS(card.id);

  const el = document.getElementById("card_" + cardId);

  // rebuild transactions
  const txList = el.querySelector(".tx-list");
  txList.innerHTML = cs.transactions.map(tx => `
    <div class="tx-item" id="tx_${tx.id}">
      <input
        class="tx-desc"
        id="tx_${tx.id}_desc"
        type="text"
        placeholder="사용내역"
        value="${tx.desc || ""}"
        oninput="updateTx('${cardId}','${tx.id}','desc',this.value)"
      >
      <input
        class="tx-amount"
        type="tel"
        placeholder="금액"
        value="${tx.amount ? tx.amount.toLocaleString('ko-KR') : ''}"
        oninput="updateTx('${cardId}','${tx.id}','amount',this.value)"
        onfocus="this.select()"
        style="color:${card.color}"
      >
      <span class="tx-won">원</span>
      <button class="tx-del" onclick="deleteTx('${cardId}','${tx.id}')">×</button>
    </div>
  `).join("");

  // rebuild scheduled
  const schedList = el.querySelector(".scheduled-list");
  if (schedList) {
    schedList.innerHTML = card.scheduled.map(p => {
      const isOff = cs.offIds.includes(p.id);
      return `
        <div class="scheduled-item ${isOff ? 'off' : ''}" onclick="toggleScheduled('${cardId}','${p.id}')">
          <span class="s-label">${p.label}</span>
          <span class="s-amount" style="color:${isOff ? '#555' : card.color}">${p.amount.toLocaleString('ko-KR')}원</span>
        </div>`;
    }).join("");
  }

  renderSummary(cardId);
}

function buildCards() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";

  CARDS.forEach((card, i) => {
    const scheduledSection = card.scheduled.length > 0 ? `
      <div class="sec-label">예약결제 (탭으로 포함/제외)</div>
      <div class="scheduled-list"></div>
    ` : "";

    const noteHTML = card.note ? `<div class="card-note">${card.note}</div>` : "";

    const div = document.createElement("div");
    div.className = "card";
    div.id = "card_" + card.id;
    div.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name" style="color:${card.color}">${card.name}</div>
          <div class="card-target">목표 ${fmt(card.target)}</div>
        </div>
        <div class="badge-done" style="background:${card.accent}">✓ 달성</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="background:linear-gradient(90deg,${card.accent},${card.color})"></div>
      </div>

      <div class="sec-label">사용내역</div>
      <div class="tx-list"></div>
      <button class="add-btn" onclick="addTx('${card.id}')">＋ 사용내역 추가</button>

      ${scheduledSection}

      <div class="summary">
        <div class="summary-row">
          <span class="sk">직접 사용 합계</span>
          <span class="sv sv-used">0원</span>
        </div>
        <div class="summary-row">
          <span class="sk">예약결제 합산</span>
          <span class="sv sv-scheduled">+ 0원</span>
        </div>
        <hr class="summary-divider">
        <div class="summary-main">
          <span class="mk">추가 필요 금액</span>
          <span class="mv">-</span>
        </div>
      </div>
      ${noteHTML}
    `;
    list.appendChild(div);
    renderCard(card.id);
  });
}

document.getElementById("headerDate").textContent =
  new Date().toLocaleDateString("ko-KR", { year:"numeric", month:"long" }) + " 기준";

buildCards();
</script>
</body>
</html>
